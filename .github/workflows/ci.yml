name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run tests
      env:
        # Test environment variables
        SUPABASE_URL: http://localhost:8000
        SUPABASE_ANON_KEY: test-anon-key
        SUPABASE_SERVICE_KEY: test-service-key
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        UPSTASH_REDIS_REST_URL: localhost:6379
        UPSTASH_REDIS_REST_TOKEN: test-token
        TWILIO_ACCOUNT_SID: test-sid
        TWILIO_AUTH_TOKEN: test-token
        TWILIO_PHONE_NUMBER: +15005550006
        TWILIO_WEBHOOK_SECRET: test-secret
        BHASHINI_USER_ID: test-user
        BHASHINI_API_KEY: test-key
        BHASHINI_PIPELINE_ID: test-pipeline
        FAST2SMS_API_KEY: test-key
        GROQ_API_KEY: test-key
        ENCRYPTION_KEY: bXlFbmNyeXB0aW9uS2V5MTIzNDU2NzgxMjM0NTY3ODEyMzQ=
        JWT_SECRET_KEY: test-jwt-secret-key-that-is-long-enough-for-hs256
        ENVIRONMENT: testing
        LOG_LEVEL: DEBUG
        USE_MOCK_EPDS: true
      run: |
        pytest tests/ -v --cov=app --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: Run Ruff linter
      run: |
        ruff check .

    - name: Run MyPy type checker
      run: |
        mypy .

  build-and-deploy:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Deploy to Render
      env:
        RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      run: |
        if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
          curl -X POST "$RENDER_DEPLOY_HOOK_URL"
        else
          echo "Render deploy hook URL not set, skipping deployment"
        fi

    # Note: Vercel deployment is automatic via Vercel GitHub integration
    # No need for explicit step here
