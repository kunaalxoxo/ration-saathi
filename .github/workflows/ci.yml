name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ "never-auto" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: "3.12" }
    - name: Install deps
      run: pip install -r requirements.txt psycopg2-binary
    - name: Run tests
      env:
        SUPABASE_URL: http://localhost:8000
        SUPABASE_ANON_KEY: test
        SUPABASE_SERVICE_KEY: test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        UPSTASH_REDIS_REST_URL: http://localhost:6379
        UPSTASH_REDIS_REST_TOKEN: test
        TWILIO_ACCOUNT_SID: test
        TWILIO_AUTH_TOKEN: test
        TWILIO_PHONE_NUMBER: "+15005550006"
        TWILIO_WEBHOOK_SECRET: test
        BHASHINI_USER_ID: test
        BHASHINI_API_KEY: test
        BHASHINI_PIPELINE_ID: test
        FAST2SMS_API_KEY: test
        R2_ACCOUNT_ID: test
        R2_ACCESS_KEY_ID: test
        R2_SECRET_ACCESS_KEY: test
        R2_BUCKET_NAME: test
        GROQ_API_KEY: test
        ENCRYPTION_KEY: bXlFbmNyeXB0aW9uS2V5MTIzNDU2NzgxMjM0NTY3ODEyMzQ=
        JWT_SECRET_KEY: test-jwt-secret-key-that-is-long-enough-for-hs256
        ENVIRONMENT: development
        LOG_LEVEL: DEBUG
        USE_MOCK_EPDS: "true"
        TOLL_FREE_NUMBER: "1800-XXX-XXXX"
      run: cd backend && python -m pytest ../tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v4
    - name: Trigger Render deploy
      env:
        RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      run: |
        if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then curl -X POST "$RENDER_DEPLOY_HOOK_URL"; fi
